name: Build OmniLight iOS

# ──────────────────────────────────────────────────────────────
# Триггеры запуска:
#   - Каждый пуш в ветку main или release/*
#   - Каждый Pull Request в ветку main
# ──────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
  # Разрешаем ручной запуск через интерфейс GitHub
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────
# Переменные окружения для всего воркфлоу
# ──────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.44.1'   # Целевая версия Flutter (обновляйте по необходимости)
  JAVA_VERSION: '17'           # Java 17 LTS — требование Flutter 3.x
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    name: 🍎 Build iOS (OmniLight by Abstrackt)
    # Используем macOS — единственная ОС, поддерживающая Xcode/iOS-сборку
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ────────────────────────────────────────
      # Шаг 1: Клонируем репозиторий
      # ────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────
      # Шаг 2: Устанавливаем Java (требуется для flutter build tools)
      # ────────────────────────────────────────
      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ────────────────────────────────────────
      # Шаг 3: Устанавливаем Flutter SDK
      # ────────────────────────────────────────
      - name: 🐦 Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true  # Кэшируем SDK между запусками для ускорения CI

      # ────────────────────────────────────────
      # Шаг 4: Проверяем окружение Flutter
      # ────────────────────────────────────────
      - name: 🔍 Flutter doctor
        run: flutter doctor -v

      # ────────────────────────────────────────
      # Шаг 5: Устанавливаем зависимости Dart/Flutter
      # ────────────────────────────────────────
      - name: 📦 Install dependencies (flutter pub get)
        run: flutter pub get

      # ────────────────────────────────────────
      # Шаг 6: Статический анализ кода
      # (Помогает поймать ошибки до компиляции)
      # ────────────────────────────────────────
      - name: 🔎 Run Flutter analyze
        run: flutter analyze --no-fatal-infos

      # ────────────────────────────────────────
      # Шаг 7: Запускаем unit-тесты
      # ────────────────────────────────────────
      - name: 🧪 Run unit tests
        run: flutter test --coverage
        continue-on-error: true  # Не блокируем сборку если тестов пока нет

      # ────────────────────────────────────────
      # Шаг 8: Кэшируем CocoaPods для ускорения
      # ────────────────────────────────────────
      - name: 🗃️ Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # ────────────────────────────────────────
      # Шаг 9: Устанавливаем CocoaPods зависимости
      # ────────────────────────────────────────
      - name: 🍫 Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        working-directory: .

      # ────────────────────────────────────────
      # Шаг 10: Настраиваем Widget Extension через Ruby
      # ────────────────────────────────────────
      - name: 🛠️ Configure iOS Widget Target
        run: |
          gem install xcodeproj
          ruby scripts/add_widget_target.rb

      # ────────────────────────────────────────
      # Шаг 11: Сборка iOS без подписи кода
      # --no-codesign: подходит для CI-артефактов (не для App Store)
      # Для подписи требуется добавить сертификаты и provisioning profiles
      # ────────────────────────────────────────
      - name: 🏗️ Build iOS (no codesign)
        run: flutter build ios --no-codesign --release --verbose

      # ────────────────────────────────────────
      # Шаг 11: Упаковываем .app в формат .ipa (Payload-структура)
      # ────────────────────────────────────────
      - name: 📦 Package as IPA
        run: |
          PAYLOAD_DIR="${{ runner.temp }}/Payload"
          mkdir -p "$PAYLOAD_DIR"
          
          # Находим собранный .app
          APP_PATH=$(find build/ios -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Найден .app: $APP_PATH"
            cp -r "$APP_PATH" "$PAYLOAD_DIR/OmniLight.app"
          else
            echo "Предупреждение: .app не найден в build/ios, используем Runner.app"
            cp -r build/ios/iphoneos/Runner.app "$PAYLOAD_DIR/OmniLight.app" || exit 1
          fi
          
          echo "Содержимое Payload/OmniLight.app:"
          ls -la "$PAYLOAD_DIR/OmniLight.app"
          
          if [ -d "$PAYLOAD_DIR/OmniLight.app/PlugIns" ]; then
            echo "Содержимое PlugIns:"
            ls -la "$PAYLOAD_DIR/OmniLight.app/PlugIns"
          else
            echo "ПАПКА PlugIns НЕ НАЙДЕНА! Виджет не скомпилировался или не скопировался!"
          fi
          
          # Архивируем Payload в .ipa
          cd "${{ runner.temp }}"
          zip -qr "OmniLight.ipa" "Payload"
          echo "IPA создана: ${{ runner.temp }}/OmniLight.ipa"

      # ────────────────────────────────────────
      # Шаг 12: Загружаем готовый .ipa в GitHub Actions
      # ────────────────────────────────────────
      - name: ⬆️ Upload IPA artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: OmniLight-iOS-IPA-${{ github.run_number }}
          path: ${{ runner.temp }}/OmniLight.ipa
          retention-days: 30
          if-no-files-found: error

      # ────────────────────────────────────────
      # Шаг 13 (опционально): Публикация Release при теге
      # Раскомментируйте для автоматических релизов при git tag push
      # ────────────────────────────────────────
